name: Constructor.io Monitor de Tags (Diario)

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC ≈ 09:00 Chile (ajustar si cambia DST)
  workflow_dispatch:

permissions:
  contents: write   # necesario para que el job pueda commitear el resultado

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install playwright

      - name: Instalar Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Correr monitor de tags
        run: node monitor-tags.js

      - name: Commitear resultado al repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/history.json
          git diff --staged --quiet && echo "Sin cambios, nada que commitear" || git commit -m "Actualización automática del monitor de tags $(date -u +%Y-%m-%d)"
          git push
